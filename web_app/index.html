<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMData Web Sync Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>MMData Sync Tool (Web)</h1>
            <button id="btnOpenDir">📂 Open Directory</button>
            <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none">
            <span id="lblCurrentFile">No File Loaded</span>
            <button id="btnToggleSpec">Toggle Spectrogram</button>
            <button id="btnPlotSettings">⚙️ Plot Settings</button>
            <button id="btnNextFile" disabled>Next File ⏭</button>
        </header>

        <div id="main-content">
            <div id="video-container" class="panel">
                <video id="videoPlayer" controls></video>
            </div>

            <div class="splitter" id="split-1"></div>

            <div id="spectrogram-container" class="panel">
                <canvas id="spectrogramCanvas"></canvas>
            </div>

            <div class="splitter" id="split-2"></div>

            <div id="sensor-container" class="panel">
                <canvas id="sensorCanvas"></canvas>
            </div>
        </div>

        <div id="controls">
            <div class="row">
                <button id="btnPlay">▶ PLAY</button>
                <select id="selSpeed">
                    <option value="1.0">1.0x</option>
                    <option value="0.5">0.5x</option>
                    <option value="0.25" selected>0.25x</option>
                </select>
                <div class="offset-row">
                    <label>Sync Offset: <span id="lblOffset">0 ms</span></label>
                    <button id="btnOffsetMinus" class="offset-btn">-1ms</button>
                    <input type="range" id="rngOffset" min="0" max="60000" value="30000">
                    <button id="btnOffsetPlus" class="offset-btn">+1ms</button>
                </div>
            </div>

            <div class="row grid-markers">
                <button id="btnStrideStart" class="marker-btn stride-start" title="Stride Start">Stride Start (S)</button>
                <button id="btnObsStart" class="marker-btn obs-start" title="Obstacle Start">Obstacle Start (D)</button>
                <button id="btnObsStop" class="marker-btn obs-stop" title="Obstacle Stop">Obstacle Stop (G)</button>
                <button id="btnStrideStop" class="marker-btn stride-stop" title="Stride Stop">Stride Stop (F)</button>
            </div>

            <div class="row">
                <label class="abnormal-label"><input type="checkbox" id="chkAbnormal"> Abnormal</label>
                <button id="btnClear">🗑 Clear Marks</button>
                <button id="btnSave">💾 Save Data</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>

    <!-- Plot Settings Modal -->
    <div id="plotSettingsModal" class="modal">
        <div class="modal-content modal-small">
            <h2>⚙️ Plot Settings</h2>

            <div class="settings-group">
                <label class="settings-section-label">Series Visibility</label>
                <label class="cb-row"><input type="checkbox" id="chkSeries1" checked> Show Accel Magnitude</label>
                <label class="cb-row"><input type="checkbox" id="chkSeries2" checked> Show Gyro Magnitude</label>
                <label class="cb-row"><input type="checkbox" id="chkSeries3" checked> Show Pressure</label>
            </div>

            <div class="settings-group">
                <label class="cb-row"><input type="checkbox" id="chkShowLPF" checked> Show LPF Lines</label>
            </div>

            <div class="settings-group lpf-freq-row">
                <label for="inpLPFFreq">LPF Cutoff Frequency (Hz):</label>
                <input type="number" id="inpLPFFreq" min="0.1" max="50" step="0.1" value="5.0">
            </div>

            <div class="modal-footer">
                <button id="btnPlotSettingsCancel">Cancel</button>
                <button id="btnPlotSettingsApply" class="btn-primary">Apply</button>
            </div>
        </div>
    </div>
</body>
</html>
